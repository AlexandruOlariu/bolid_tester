name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      # --ignore-scripts: we only need types/sources for checks, not native builds.
      - run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund
      - name: Lint (core)
        run: npm run lint
      - name: Typecheck (core)
        run: npm run typecheck
      - name: Test (core + simulator)
        run: npm test
      - name: Typecheck (full app)
        run: npm run typecheck:app

  # Release build: produces an installable Android APK on every push to main,
  # but only after `verify` (lint/typecheck/test) passes. The APK is attached
  # to a GitHub Release and uploaded as a workflow artifact.
  release-android:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release + tag
    concurrency:
      group: release-android
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      # Full install (scripts enabled) so Expo config plugins are available to prebuild.
      - run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Read app version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      # android/ is gitignored, so prebuild regenerates the native project from app.json.
      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
      # NOTE: signed with the debug keystore generated by prebuild — installable for
      # internal testing, NOT Play Store. To ship a real release, add a keystore secret
      # and a signingConfigs.release block, e.g.:
      #   - run: echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/release.keystore
      #     env: { ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }} }
      # then pass the store/key passwords to Gradle via -P flags.
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
      - name: Collect APK
        id: apk
        run: |
          src=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)
          if [ -z "$src" ]; then echo "No APK produced" >&2; exit 1; fi
          mkdir -p dist
          out="dist/bolid-tester-v${{ steps.ver.outputs.version }}-build${{ github.run_number }}.apk"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.ver.outputs.version }}-build${{ github.run_number }}"
          gh release create "$tag" "${{ steps.apk.outputs.path }}" \
            --target "${{ github.sha }}" \
            --title "v${{ steps.ver.outputs.version }} — build ${{ github.run_number }}" \
            --notes "Automated release build from \`${{ github.sha }}\`. Debug-signed APK for internal testing."
